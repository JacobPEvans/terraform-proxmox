name: Claude Code Review

on:
  workflow_dispatch:
  # --- DISABLED AUTOMATIC TRIGGERS (restore by uncommenting) ---
  # pull_request:
  #   types: [opened, synchronize]
  # issue_comment:
  #   types: [created]
  # --- END DISABLED ---

permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    uses: JacobPEvans/ai-workflows/.github/workflows/claude-review.yml@main
    with:
      review_prompt: "Focus on Terraform best practices, security, SOPS/age patterns"
    secrets: inherit
